<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Putar Bola Singa</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Gradient Orange ke Hitam */
            background: linear-gradient(135deg, #ff8c00 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 2;
        }

        h1 {
            font-size: 2rem;
            color: #ffcc00;
        }

        /* WHEEL CONTAINER */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
            border: 5px solid #fff;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        /* PENUNJUK (PANAH) */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff0000;
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        /* TOMBOL SPIN */
        .spin-btn {
            background: linear-gradient(to bottom, #ffcc00, #ff8c00);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #000;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 2;
        }

        .spin-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .spin-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        /* HASIL */
        #result {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffcc00;
            z-index: 2;
        }

        /* FOOTER BUTTONS */
        .footer-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
            z-index: 2;
        }

        .btn-link {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s;
            flex: 1;
            max-width: 200px;
            text-align: center;
        }

        .btn-gacor {
            background-color: #ff0055;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s;
            flex: 1;
            max-width: 200px;
            text-align: center;
        }

        .btn-link:hover, .btn-gacor:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- MODAL REDEEM CODE --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            color: #000;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #ff8c00;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #ff8c00;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
        }

        .modal-content button {
            background: #ff8c00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .modal-content button:hover {
            background: #e07b00;
        }

        .hidden {
            display: none !important;
        }

        /* RESPONSIVE */
        @media (max-width: 400px) {
            .wheel-container {
                width: 280px;
                height: 280px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- MODAL REDEEM CODE (Muncul saat pertama kali buka) -->
    <div id="redeemModal" class="modal-overlay">
        <div class="modal-content">
            <h2>MASUKKAN KODE</h2>
            <p>Masukkan kode redeem untuk membuka roda.</p>
            <input type="text" id="redeemInput" placeholder="KODE SPESIAL">
            <button onclick="checkRedeemCode()">Buka Roda</button>
            <p id="redeemError" style="color: red; margin-top: 10px; font-size: 0.9rem;"></p>
        </div>
    </div>

    <header>
        <h1>EVENT PUTAR BOLASINGA</h1>
    </header>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button id="spinBtn" class="spin-btn">PUTAR SEKARANG!</button>
    <div id="result"></div>

    <div class="footer-buttons">
        <a href="#" class="btn-gacor">Link Gacor</a>
        <a href="#" class="btn-link">No WA</a>
    </div>

    <script>

// --- KONFIGURASI DATA RODA ---
const segments = [
{ label: "HP", color: "#FF5733", chance: 5 },
{ label: "Mobil", color: "#C70039", chance: 2 },
{ label: "Motor", color: "#900C3F", chance: 5 },
{ label: "Baju", color: "#581845", chance: 20 },
{ label: "Topi", color: "#FFC300", chance: 20 },
{ label: "Sepatu", color: "#DAF7A6", chance: 20 },
{ label: "Sepeda", color: "#33FF57", chance: 28 }
];

// --- DATA KODE REDEEM ---
let validCodes = {
"SINGA123": false,
"GACOR": false,
"BOLASINGA": false,
"FREE": false,
"KODE001": false,
"KODE002": false,
"KODE003": false,
"KODE004": false,
"KODE005": false
};

// load dari localStorage
const savedCodes = localStorage.getItem("usedCodes");
if(savedCodes){
validCodes = JSON.parse(savedCodes);
}

// --- VARIABEL ---
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const resultDiv = document.getElementById('result');
const redeemModal = document.getElementById('redeemModal');
const redeemInput = document.getElementById('redeemInput');
const redeemError = document.getElementById('redeemError');

let currentRotation = 0;
let isSpun = false;

const totalSegments = segments.length;
const arcSize = (2 * Math.PI) / totalSegments;


// --- GAMBAR RODA ---
function drawWheel() {

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const radius = canvas.width / 2;

segments.forEach((segment, index) => {

const angle = index * arcSize;

ctx.beginPath();
ctx.fillStyle = segment.color;
ctx.moveTo(centerX, centerY);
ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
ctx.lineTo(centerX, centerY);
ctx.fill();

ctx.save();
ctx.translate(centerX, centerY);
ctx.rotate(angle + arcSize / 2);
ctx.textAlign = "right";
ctx.fillStyle = "#000";
ctx.font = "bold 24px Arial";
ctx.fillText(segment.label, radius - 20, 10);
ctx.restore();

});

}


// --- CEK KODE REDEEM ---
function checkRedeemCode(){

const inputCode = redeemInput.value.trim().toUpperCase();

if(validCodes.hasOwnProperty(inputCode)){

if(validCodes[inputCode] === false){

validCodes[inputCode] = true;

localStorage.setItem("usedCodes", JSON.stringify(validCodes));

redeemModal.classList.add("hidden");
redeemError.innerText = "";
redeemInput.value = "";

}else{

redeemError.innerText = "Kode sudah digunakan!";

}

}else{

redeemError.innerText = "Kode tidak valid!";

}

}


// --- SPIN RODA ---
function spin(){

if(isSpun){
resultDiv.innerText = "Kesempatan sudah digunakan.";
return;
}

spinBtn.disabled = true;
resultDiv.innerText = "Sedang memutar...";

const totalChance = segments.reduce((sum, seg)=> sum + seg.chance, 0);

let random = Math.random() * totalChance;
let winnerIndex = 0;

for(let i=0;i<segments.length;i++){

if(random < segments[i].chance){
winnerIndex = i;
break;
}

random -= segments[i].chance;

}

const minSpins = 5;
const sliceAngle = 360 / totalSegments;

const winnerAngle = (winnerIndex * sliceAngle) + (sliceAngle / 2);
const randomOffset = (Math.random()*sliceAngle*0.8)-(sliceAngle*0.4);

const finalRotation = (minSpins * 360) + (270 - winnerAngle) + randomOffset;

currentRotation += finalRotation;

canvas.style.transform = `rotate(${currentRotation}deg)`;

setTimeout(()=>{

const winnerItem = segments[winnerIndex];

resultDiv.innerHTML =
`🎉 SELAMAT! ANDA MENDAPAT:<br><span style="font-size:1.5rem;color:white">${winnerItem.label}</span>`;

isSpun = true;

spinBtn.disabled = true;
spinBtn.innerText = "HABIS!";

},4000);

}


// EVENT
spinBtn.addEventListener("click", spin);

// gambar roda
drawWheel();

</script>
</body>
</html>
